<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maulana AI</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
  
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="rain-container"></div>
  
  <audio id="bg-music" loop>
    <source src="ms/m.mp3" type="audio/mpeg">
    Browser Anda tidak mendukung elemen audio.
  </audio>

  <div class="chat-container">
    <header>
      <i class="fa-solid fa-robot"></i>
      <h1>Maulana AI</h1>
    </header>

    <main class="chat-box" id="chat-box">
      <div class="message-wrapper bot">
          <div class="message-icon"><i class="fa-solid fa-robot"></i></div>
          <div class="message" id="intro-message"></div>
      </div>
    </main>
    
    <footer>
      <form id="chat-form">
        <textarea id="user-input" placeholder="Ketik pesan Anda di sini..." required></textarea>
        <button type="submit" id="send-btn">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </form>
    </footer>
  </div>
  
  <script src="js/script.js"></script>
</body>
</html>
